name: Reporte Energético Diario

on:
  schedule:
    - cron: '0 13 * * *' # 8:00 AM hora Bogotá (UTC-5)
  workflow_dispatch: 

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacion de dependencias
        run: |
          pip install numpy==1.23.5 pandas==1.5.3 matplotlib==3.7.5 pydataxm

      - name: Ejecucion de script_prueba.py
        run: python script_prueba.py

      - name: Subir grafica como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: reporte-visual
          path: reporte_energetico.png # <--- DEBE COINCIDIR CON EL NOMBRE EN EL SCRIPT

name: Monitor Diario Transicion

on:
  schedule:
    - cron: '0 15 * * *' # Se ejecuta a las 10:00 AM hora Colombia
  workflow_dispatch:

jobs:
  run_monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # IMPORTANTE: Mantener estas versiones para que pydataxm funcione
        run: |
          pip install numpy==1.23.5 pandas==1.5.3 pydataxm requests

      - name: Execute Monitor
        run: python monitor_brecha.py

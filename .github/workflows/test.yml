name: Test Visualizacion Datos

on:
  workflow_dispatch: # Ejecución manual desde la pestaña Actions

jobs:
  diagnostico_consola:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalacion de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacion de dependencias controladas
        run: |
          pip install numpy==1.23.5 pandas==1.5.3 pydataxm

      - name: Ejecucion del Script de Prueba
        run: python monitor_brecha.py

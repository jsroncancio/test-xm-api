name: Dashboard Energetico 8AM

on:
  schedule:
    - cron: '0 13 * * *' # 8:00 AM Bogotá
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Dependencies
        run: pip install numpy==1.23.5 pandas==1.5.3 matplotlib==3.7.5 pydataxm
      - name: Run
        run: python script_prueba.py
      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-tecnico
          path: dashboard_generacion.png
